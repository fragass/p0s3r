<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workday CNX</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="css/loginf.css">
</head>
<body>

  <div class="login-card">
    <div style="display:flex;gap:8px;margin-bottom:12px;">
      <button id="tabLogin" class="tab-btn active" type="button">Entrar</button>
      <button id="tabRegister" class="tab-btn" type="button">Criar conta</button>
    </div>

    <form id="loginForm">
      <input type="text" id="username" placeholder="Usuário" autocomplete="off" required>
      <input type="password" id="password" placeholder="Senha" autocomplete="off" required>
      <button id="submitBtn" type="submit">Entrar</button>
    </form>

    <p id="errorMsg"></p>
  </div>

  <script src="js/loginf.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link rel="stylesheet" href="/assets/app.css"/>
</head>
<body>
  <div class="app" id="app" data-theme="light">
    <aside class="sidebar">
      <div class="sb-top">
        <div class="brand-row">
          <div class="brand-title">
            <strong>Workspace</strong>
            <span>DM + Grupos • básico</span>
          </div>

          <button class="btn" id="themeBtn" type="button">
            <span id="themeIcon">🌙</span><span id="themeLabel">Dark</span>
          </button>
        </div>

        <div class="row">
          <input class="input" id="dmUserInput" placeholder="username pra DM (ex: ana)"/>
          <button class="btn primary" id="dmCreateBtn" type="button">+ Chat</button>
        </div>

        <div class="row" style="margin-top:10px;">
          <button class="btn" id="groupOpenBtn" type="button">+ Grupo</button>
          <input class="input" id="searchInput" placeholder="Pesquisar…"/>
          <button class="btn" id="logoutBtn" type="button">Sair</button>
        </div>

        <div id="sbMsg" class="small" style="margin-top:8px;min-height:18px;"></div>
      </div>

      <div class="sb-list" id="chatList">
        <div class="section-title"><span>DM</span><span class="pill">privado</span></div>
        <div id="dmList"></div>

        <div class="section-title" style="margin-top:8px;"><span>Grupos</span><span class="pill">simples</span></div>
        <div id="groupList"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="chat-head">
          <div class="avatar" id="chatAvatar">?</div>
          <div class="title">
            <strong id="chatTitle">Nenhum chat selecionado</strong>
            <span id="chatSub">Crie um DM ou um grupo</span>
          </div>
        </div>

        <div class="row" style="gap:8px;align-items:center;">
          <button class="btn" id="addMemberBtn" type="button" style="display:none;">+ Pessoa</button>
        </div>
      </header>

      <section class="msgs" id="msgs">
        <div class="day">—</div>
        <div class="small" style="text-align:center;margin-top:10px;">Nenhuma mensagem ainda.</div>
      </section>

      <footer class="composer">
        <input id="file" type="file" style="display:none"/>
        <button class="iconbtn" id="attachBtn" type="button">＋</button>
        <textarea id="input" placeholder="Escreva uma mensagem… (Enter envia, Shift+Enter quebra linha)"></textarea>
        <button class="iconbtn" id="sendBtn" type="button">➤</button>
      </footer>
    </main>
  </div>

  <!-- Modal: criar grupo -->
  <div class="modal-backdrop" id="groupModal">
    <div class="modal">
      <div class="brand-row" style="margin-bottom:10px;">
        <h3>Criar grupo</h3>
        <button class="btn" id="groupCloseBtn" type="button">Fechar</button>
      </div>
      <div class="grid">
        <input class="input" id="groupTitle" placeholder="Nome do grupo (ex: Projeto X)"/>
        <textarea id="groupMembers" placeholder="Usernames (um por linha)&#10;ex: ana&#10;pedro"></textarea>
        <button class="btn primary" id="groupCreateBtn" type="button">Criar</button>
        <div class="small" id="groupMsg" style="min-height:18px;"></div>
      </div>
    </div>
  </div>

  <!-- Modal: adicionar membro -->
  <div class="modal-backdrop" id="memberModal">
    <div class="modal">
      <div class="brand-row" style="margin-bottom:10px;">
        <h3>Adicionar pessoa</h3>
        <button class="btn" id="memberCloseBtn" type="button">Fechar</button>
      </div>
      <div class="grid">
        <input class="input" id="memberUsername" placeholder="username (ex: bia)"/>
        <button class="btn primary" id="memberAddBtn" type="button">Adicionar</button>
        <div class="small" id="memberMsg" style="min-height:18px;"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>

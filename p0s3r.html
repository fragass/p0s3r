<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chat</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="/assets/app.css"/>
</head>
<body>
  <div class="app" id="app">
    <aside class="sidebar">
      <div class="sb-top">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;">
          <div>
            <div style="font-weight:900;">Chats</div>
            <div class="small" id="meLabel">…</div>
          </div>
          <button class="btn" id="themeBtn" type="button">
            <span id="themeIcon">🌙</span><span id="themeLabel">Dark</span>
          </button>
        </div>

        <div class="row">
          <input class="input" id="dmUserInput" placeholder="username pra DM (ex: ana)"/>
          <button class="btn primary" id="dmCreateBtn" type="button">+ Chat</button>
        </div>

        <div class="row" style="margin-top:10px;">
          <button class="btn" id="groupOpenBtn" type="button">+ Grupo</button>
          <button class="btn" id="logoutBtn" type="button">Sair</button>
        </div>

        <div class="small" id="sbMsg" style="margin-top:8px;min-height:18px;"></div>
      </div>

      <div class="sb-list">
        <div class="small" style="padding:8px 10px;">DM</div>
        <div id="dmList"></div>

        <div class="small" style="padding:8px 10px;margin-top:8px;">Grupos</div>
        <div id="groupList"></div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div style="display:flex;align-items:center;gap:10px;min-width:0;">
          <div class="avatar" id="chatAvatar">?</div>
          <div style="min-width:0;">
            <div style="font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" id="chatTitle">Nenhum chat</div>
            <div class="small" id="chatSub">Crie um DM ou grupo</div>
          </div>
        </div>
        <button class="btn" id="addMemberBtn" type="button" style="display:none;">+ Pessoa</button>
      </header>

      <section class="msgs" id="msgs">
        <div class="small" style="text-align:center;margin-top:16px;">Selecione um chat.</div>
      </section>

      <footer class="composer">
        <input id="file" type="file" style="display:none"/>
        <button class="iconbtn" id="attachBtn" type="button">＋</button>
        <textarea id="input" placeholder="Escreva uma mensagem… (Enter envia / Shift+Enter quebra)"></textarea>
        <button class="iconbtn" id="sendBtn" type="button">➤</button>
      </footer>
    </main>
  </div>

  <!-- Modal grupo -->
  <div class="modal-backdrop" id="groupModal">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <div style="font-weight:900;">Criar grupo</div>
        <button class="btn" id="groupCloseBtn" type="button">Fechar</button>
      </div>
      <div class="grid">
        <input class="input" id="groupTitle" placeholder="Nome do grupo"/>
        <textarea id="groupMembers" placeholder="Usernames (um por linha)"></textarea>
        <button class="btn primary" id="groupCreateBtn" type="button">Criar</button>
        <div class="small" id="groupMsg" style="min-height:18px;"></div>
      </div>
    </div>
  </div>

  <!-- Modal adicionar membro -->
  <div class="modal-backdrop" id="memberModal">
    <div class="modal">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;">
        <div style="font-weight:900;">Adicionar pessoa</div>
        <button class="btn" id="memberCloseBtn" type="button">Fechar</button>
      </div>
      <div class="grid">
        <input class="input" id="memberUsername" placeholder="username"/>
        <button class="btn primary" id="memberAddBtn" type="button">Adicionar</button>
        <div class="small" id="memberMsg" style="min-height:18px;"></div>
      </div>
    </div>
  </div>

  <script type="module" src="/assets/app.js"></script>
</body>
</html>
